      netif: "{{ hostvars['val-flare-01']['netif'] }}"
      cores: 4
      memory: 16384
      swap: 8192
      password: "{{ default_password }}"
      disk: "{{ zfs_storage }}:20"
      mounts: '{"mp0":"{{ zfs_storage }}:8000,mp={{ hostvars["val-flare-01"]["default_database_path"] }}"}'
      onboot: True
      unprivileged: True
      validate_certs: False
      description: "{{ hostvars['val-flare-01']['default_network'] }} {{ hostvars['val-flare-01']['default_node_type'] }}: {{ hostvars['val-flare-01']['host_name'] }}"
