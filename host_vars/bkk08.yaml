---
host_name: "bkk08.rotko.net"
host_timezone: "Asia/Bangkok"
ansible_host: "160.22.181.181"
ansible_port: 22788
default_host_internal_ip: "10.8.0.1"
default_host_public_gw: "10.155.100.8"
default_host_public_gw6: "fd00:155:100::8"
role: "proxmox"
ubuntu_template_id: 9008

kernel_modules:
  - k10temp

default_kvm_host: "192.168.69.220"
default_kvm_port: "22798"
default_need_routeros_port_forwarding: True
routeros_delegate_host: "bkk50"
default_need_iptables_port_forwarding: False
default_gw_device: "vmbr0"
default_storage: "bkk08pool"
zfs_storage: "bkk08pool"
# lvm_storage: "tank07lvm" # old
# default_resource_pool: "bkk07_resource_pool"
# default_max_cores: 192

port_forwards:
  - from_port: "{{ ansible_port }}"
    to_host: "{{ container_ip }}:22"
    protocol: "tcp"
# - from_port: "20817" #  Proxmox UI
#   to_host: "{{ container_ip }}:8006"
#   protocol: "tcp"

proxmox_vms:
  - host: "ibp-geodns-01"
    proxmox_config:
      vmid: 500811
      name: "{{ hostvars['ibp-geodns-01']['host_name'].split('.')[0] }}"
      clone: 9008
      full: True
      cores: "{{ hostvars['ibp-geodns-01']['vm_cores'] }}"
      memory: "{{ hostvars['ibp-geodns-01']['vm_memory'] }}"
      scsihw: "virtio-scsi-pci"
      scsi:
        scsi0: "{{ zfs_storage }}:{{ hostvars['ibp-geodns-01']['vm_disk_size'] | regex_replace('G$', '') }},discard=on"
      net:
        net0: "virtio,bridge=vmbr0"
      ipconfig:
        ipconfig0: "ip={{ hostvars['ibp-geodns-01']['container_ip'] }}/24,gw=100.64.1.1"
        ipconfig1: "ip={{ hostvars['ibp-geodns-01']['public_ip'] }}/32"
      nameserver: "1.1.1.1"
      ciuser: "admin"
      sshkeys: "{{ lookup('file', '~/.ssh/unlabored/ansible_ssh_key.pub') | default('') }}"
      onboot: True
      state: present
      description: "Geo DNS: {{ hostvars['ibp-geodns-01']['host_name'] }}"
    port_forwards:
      - from_port: "{{ hostvars['ibp-geodns-01']['ansible_port'] }}"
        to_host: "{{ hostvars['ibp-geodns-01']['container_ip'] }}:22"
        protocol: "tcp"

