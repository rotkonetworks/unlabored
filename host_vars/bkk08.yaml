  - host: "rpc-collectives-paseo-02"
    proxmox_config:
      vmid: "34032"
      hostname: "{{ hostvars['rpc-collectives-paseo-02']['host_name'] }}"
      # ostemplate: "local:vztmpl/{{ default_container_template }}"
      update: False
      netif: "{{ hostvars['rpc-collectives-paseo-02']['netif'] }}"
      cores: 4
      memory: 16384
      swap: 8192
      password: "{{ default_password }}"
      disk: "{{ zfs_storage }}:20"
      mounts: '{"mp0":"{{ zfs_storage }}:200,mp={{ hostvars["rpc-collectives-paseo-02"]["default_database_path"] }}"}'
      onboot: True
      unprivileged: True
      validate_certs: False
      description: "{{ hostvars['rpc-collectives-paseo-02']['default_network'] }} {{ hostvars['rpc-collectives-paseo-02']['default_node_type'] }}: {{ hostvars['rpc-collectives-paseo-02']['host_name'] }}"
      state: present
      features:
        - nesting=1
    port_forwards:
      - from_port: "{{ hostvars['rpc-collectives-paseo-02']['ansible_port'] }}"
        to_host: "{{ hostvars['rpc-collectives-paseo-02']['container_ip'] }}:{{ ssh_port }}"
        protocol: "tcp"
      - from_port: "{{ hostvars['rpc-collectives-paseo-02']['zabbix_ext_port'] }}"
        to_host: "{{ hostvars['monitor']['container_ip'] }}:{{ zabbix_port }}"
        protocol: "tcp"
      - from_port: "{{ hostvars['rpc-collectives-paseo-02']['default_p2p_port'] }}"
        to_host: "{{ hostvars['rpc-collectives-paseo-02']['container_ip'] }}:{{ hostvars['rpc-collectives-paseo-02']['default_p2p_port'] }}"
        protocol: "tcp"
