---
# eth-fdc-01 — reth + lighthouse, ETH execution layer for Flare FDC's EVM verifier
ansible_host: "{{ container_internal_ip }}"
ansible_ssh_common_args: "-o ProxyJump=root@160.22.181.8" # bkk08 NAT
container_ip: "192.168.78.202"
container_internal_ip: "10.8.0.202"
container_public_ip: "160.22.181.202"
container_public_ip6: "2401:a860:1110::12"
host_name: "eth-fdc-01.rotko.net"
host_timezone: "Asia/Bangkok"
netif:
  net0: "name=eth0,gw=10.8.0.1,ip={{ container_internal_ip }}/16,bridge={{ default_host_internal_bridge }}"
  net1: "name=eth1,ip={{ container_public_ip }}/32,ip6={{ container_public_ip6 }}/128,bridge={{ default_host_public_bridge }}"

role: "reth"
ansible_python_interpreter: /usr/bin/python3
# pinned_service: True   # flip to True after first successful sync (~24-36h for --full)

# default_node_type: archive | full | minimal — picked once, can't change without resync.
# Using "full" because FDC verifier only needs recent state; saves ~2 TB vs archive.
default_node_type: "full"
default_network: "mainnet"
default_database_path: "/opt/reth/storage"
default_p2p_port: 30303

zabbix_ext_port: 10802
