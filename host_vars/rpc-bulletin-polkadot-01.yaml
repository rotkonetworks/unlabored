---
ansible_host: "{{ container_internal_ip }}"
ansible_ssh_common_args: "-o ProxyJump=root@160.22.181.7"
container_ip: "192.168.111.40"
container_internal_ip: "10.7.111.40"
container_public_ip: "160.22.181.116"
container_public_ip6: "2401:a860:1116::11"
host_name: "rpc-bulletin-polkadot-01.rotko.net"
host_timezone: "Asia/Bangkok"
netif:
  net0: "name=eth0,gw=10.7.0.1,ip=10.7.111.40/16,bridge={{ default_host_internal_bridge }}"
  net1: "name=eth1,ip={{ hostvars['rpc-bulletin-polkadot-01']['container_public_ip'] }}/32,ip6={{ hostvars['rpc-bulletin-polkadot-01']['container_public_ip6'] }}/128,bridge={{ default_host_public_bridge }}"
role: "bulletin"
pinned_service: False

default_telemetry_name: "Rotko Networks - {{ host_name.split('.')[0] }} {{ default_node_type | capitalize }}"
default_domain: "{{ host_name }}"
default_network: "bulletin-polkadot"
default_chain_spec: "{{ default_base_path }}/bulletin-polkadot-chainspec.json"
default_chain_spec_dl_url: "https://raw.githubusercontent.com/paritytech/polkadot-bulletin-chain/main/chainspecs/polkadot-chainspec.json"
default_relay_rpc: "ws://{{ hostvars['rpc-polkadot-01']['container_ip'] }}:{{ hostvars['rpc-polkadot-01']['default_rpc_port'] }}"
default_relay_rpc_fallback: "ws://{{ hostvars['rpc-polkadot-02']['container_ip'] }}:{{ hostvars['rpc-polkadot-02']['default_rpc_port'] }}"
default_database: "paritydb"
default_node_type: "collator"
default_syncmode: "warp"

default_p2p_port: 30533
default_p2p_port_ws: 30534
default_p2p_port_wss: 30535
default_rpc_port: 9400
default_prom_port: 7400
default_secure_rpc_port: 42500
zabbix_ext_port: 10500
