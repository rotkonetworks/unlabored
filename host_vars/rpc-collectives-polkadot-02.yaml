---
ansible_host: "{{ container_internal_ip }}"
ansible_ssh_common_args: "-o ProxyJump=root@160.22.181.7"
container_ip: "192.168.112.13"
host_name: "rpc-collectives-polkadot-02.ct.rotko.net"
host_timezone: "Asia/Bangkok"
netif:
  net0: "name=eth0,gw=10.7.0.1,ip=10.7.112.13/16,bridge={{ default_host_internal_bridge }}"
container_internal_ip: "10.7.112.13"
role: "cumulus"
pinned_service: True

default_telemetry_name: "Rotko Networks - {{ host_name.split('.')[0] }} {{ default_node_type | capitalize }}"
default_domain: "{{ host_name }}"
default_network: collectives-polkadot
default_relay_rpc: "ws://{{ hostvars['rpc-polkadot-01']['container_ip'] }}:{{ hostvars['rpc-polkadot-01']['default_rpc_port'] }}"
default_relay_rpc_fallback: "ws://{{ hostvars['rpc-polkadot-02']['container_ip'] }}:{{ hostvars['rpc-polkadot-02']['default_rpc_port'] }}"
default_database: rocksdb
default_node_type: "endpoint"
zabbix_ext_port: 10672

default_bootnode_domain: "{{ default_network }}.boot.rotko.net"

default_p2p_port: 31032
default_bootnode_p2p_port: 31032
default_bootnode_p2p_port_ws: 30434
default_bootnode_p2p_port_wss: 30435
default_rpc_port: 9400
default_secure_rpc_port: 42672
default_prom_port: 7400
