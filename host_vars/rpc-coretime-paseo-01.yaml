---
ansible_host: "{{ container_internal_ip }}"
ansible_ssh_common_args: "-o ProxyJump=root@160.22.181.6"
container_ip: "192.168.46.90"
container_internal_ip: "10.6.141.15"
container_public_ip: "160.22.181.145"
container_public_ip6: "2401:a860:1145::11"
host_name: "rpc-coretime-paseo-01.rotko.net"
host_timezone: "Asia/Bangkok"
netif:
  net0: "name=eth0,gw=10.6.0.1,ip=10.6.141.15/16,bridge={{ default_host_internal_bridge }}"
  net1: "name=eth1,ip={{ hostvars['rpc-coretime-paseo-01']['container_public_ip'] }}/32,ip6={{ hostvars['rpc-coretime-paseo-01']['container_public_ip6'] }}/128,bridge={{ default_host_public_bridge }}"
role: "cumulus"
pinned_service: True

default_telemetry_name: "Rotko Networks - {{ host_name.split('.')[0] }} {{ default_node_type | capitalize }}"
default_domain: "{{ host_name }}"
default_network: "coretime-paseo"
default_network_pathname: "paseo-coretime"
default_chain_spec: "{{ default_base_path }}/coretime-paseo.raw.json"
default_chain_spec_dl_url: "https://github.com/paseo-network/paseo-chain-specs/raw/refs/heads/main/paseo-coretime.raw.json"
default_relay_rpc: "ws://{{ hostvars['rpc-paseo-01']['container_ip'] }}:{{ hostvars['rpc-paseo-01']['default_rpc_port'] }}"
default_relay_rpc_fallback: "ws://{{ hostvars['rpc-paseo-02']['container_ip'] }}:{{ hostvars['rpc-paseo-02']['default_rpc_port'] }}"
default_database: "rocksdb"
default_node_type: "endpoint"
zabbix_ext_port: 10966

default_bootnode_domain: "{{ default_network }}.boot.rotko.net"

default_p2p_port: 34051
default_bootnode_p2p_port: 34051
default_bootnode_p2p_port_ws: 30434
default_bootnode_p2p_port_wss: 30435
default_rpc_port: 9400
