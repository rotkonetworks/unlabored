---
ansible_host: "{{ container_internal_ip }}"
ansible_ssh_common_args: "-o ProxyJump=root@160.22.181.7"
container_internal_ip: "10.7.241.10"
# Public v6 anchored to bkk07's prefix (2401:a860:1007::/48), gw = host vmbr1.
# Globally reachable via the 2401:a860::/32 aggregate; replaces bkk50-based v6.
# container_ip6: "2401:a860:1007:76::3404"
container_public_ip: "160.22.181.41"
container_public_ip6: "2401:a860:1007:76::3404"
host_name: "val-paseo-01.ct.rotko.net"
host_timezone: "Asia/Bangkok"
# netif:
#   net0: "name=eth0,gw=10.7.0.1,ip={{ container_internal_ip }}/16,ip6={{ container_ip6 }}/48,gw6=2401:a860:1007::1,bridge={{ default_host_internal_bridge }}"
netif:
  net0: "name=eth0,gw=10.7.0.1,ip={{ container_internal_ip }}/16,bridge={{ default_host_internal_bridge }}"
  net1: "name=eth1,ip={{ hostvars['val-paseo-01']['container_public_ip'] }}/32,ip6={{ hostvars['val-paseo-01']['container_public_ip6'] }}/128,bridge={{ default_host_public_bridge }}"
role: "polkadot"
pinned_service: True

default_telemetry_name: "rotko-net-pso03"
default_chains_name: "paseo"
default_network: "paseo"
default_chain_spec: "{{ default_base_path }}/paseo.raw.json"
default_chain_spec_dl_url: "https://paseo-r2.zondax.ch/chain-specs/paseo.raw.json"
default_node_type: "validator"
default_pruning: 1000
default_database: paritydb
default_syncmode: warp

default_p2p_port: 34004
default_p2p_port_ws: 30334
default_p2p_port_wss: 30335

default_rpc_port: 9300
default_prom_port: 7300
default_secure_rpc_port: 42141
zabbix_ext_port: 10141
