# Standards: 0.2
---
# FDC EVM verifier — handles ETH, FLR, SGB attestations.
# Source: https://github.com/flare-foundation/fdc-suite-deployment/tree/main/evm-verifier

fdc_base: "/opt/fdc"
fdc_evm_base: "{{ fdc_base }}/evm-verifier"

# Pinned image (matches FDC reference repo). Bump when upstream releases new tag.
fdc_evm_image: "ghcr.io/flare-foundation/evm-verifier:v1.0.3@sha256:f3669154865f54daf41329f3774024c26a088a90658ee8e42ee91ed5c307691e"
fdc_evm_container_name: "fdc-evm-verifier"

# Port — bound to container_ip (mgmt) so FDC client across LXCs can reach it.
fdc_evm_port: 9800

# RPC endpoints. ETH = local reth on this host; FLR = val-flare-01 across LXCs.
# SGB intentionally blank — we don't run a Songbird node yet, so SGB attestations
# will return errors. Add SGB endpoint if/when we deploy songbird-fdc-01.
fdc_evm_eth_rpc: "http://127.0.0.1:8545"
fdc_evm_flr_rpc: "http://192.168.78.201:9650/ext/bc/C/rpc"
fdc_evm_sgb_rpc: ""
fdc_evm_testnet: "false"

# API key — verifier_api_key sourced from vault (see secret_vault.yaml).
# Comma-separated list of API keys allowed to call this verifier.
fdc_evm_api_keys: "{{ vault_fdc_evm_api_keys | default('changeme-set-vault') }}"

fdc_evm_systemd_unit: "/etc/systemd/system/fdc-evm-verifier.service"
