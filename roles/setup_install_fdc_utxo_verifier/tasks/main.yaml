# Standards: 0.2
---
- name: Sanity check — chain group must be bitcoind or dogecoind
  ansible.builtin.assert:
    that:
      - fdc_utxo_chain in ['btc', 'doge']
    fail_msg: "Host must be in [bitcoind] or [dogecoind] inventory group; resolved chain={{ fdc_utxo_chain }}"

- name: Ensure FDC base directory exists
  ansible.builtin.file:
    path: "{{ fdc_base }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"

- name: Ensure FDC {{ fdc_utxo_chain }} verifier directory exists
  ansible.builtin.file:
    path: "{{ fdc_utxo_base }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0750"

- name: Render docker-compose.yaml
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ fdc_utxo_base }}/docker-compose.yaml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0640"
  notify:
    - Restart FDC UTXO verifier

- name: Render verifier.env
  ansible.builtin.template:
    src: verifier.env.j2
    dest: "{{ fdc_utxo_base }}/verifier.env"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0600"
  notify:
    - Restart FDC UTXO verifier

- name: Render indexer.env
  ansible.builtin.template:
    src: indexer.env.j2
    dest: "{{ fdc_utxo_base }}/indexer.env"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0600"
  notify:
    - Restart FDC UTXO verifier

- name: Render database.env
  ansible.builtin.template:
    src: database.env.j2
    dest: "{{ fdc_utxo_base }}/database.env"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0600"
  notify:
    - Restart FDC UTXO verifier

- name: Render systemd unit for FDC {{ fdc_utxo_chain }} verifier
  ansible.builtin.template:
    src: fdc-utxo-verifier.service.j2
    dest: "{{ fdc_utxo_systemd_unit }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart FDC UTXO verifier

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure FDC {{ fdc_utxo_chain }} verifier service is enabled and running
  ansible.builtin.systemd:
    name: "fdc-{{ fdc_utxo_chain }}-verifier"
    enabled: True
    state: started
