# Standards: 0.2
---
- name: Ensure group {{ ethereum_user }} exists
  ansible.builtin.group:
    name: "{{ ethereum_user }}"
    state: present
    system: True

- name: Ensure user {{ ethereum_user }} exists
  ansible.builtin.user:
    append: True
    comment: Reth service user
    create_home: True
    group: "{{ ethereum_user }}"
    groups: sudo
    home: "{{ ethereum_base }}"
    name: "{{ ethereum_user }}"
    shell: "{{ default_shell }}"
    state: present
    system: True

- name: Update .profile with cargo env
  ansible.builtin.blockinfile:
    path: "{{ ethereum_base }}/.profile"
    owner: "{{ ethereum_user }}"
    group: "{{ ethereum_user }}"
    create: True
    mode: "0644"
    block: |
      export CARGO_HOME="$HOME/.cargo"
      export RUSTUP_HOME="$HOME/.rustup"
      export PATH="$CARGO_HOME/bin:$PATH"

- name: Ensure required directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ ethereum_user }}"
    group: "{{ ethereum_user }}"
    mode: "0775"
    state: directory
  with_items:
    - "{{ ethereum_base }}"
    - "{{ ethereum_src_path }}"
    - "{{ ethereum_storage_path }}"
    - "{{ ethereum_storage_path }}/logs"

- name: Install reth build dependencies
  ansible.builtin.package:
    name:
      - build-essential
      - libclang-dev
      - pkg-config
      - libssl-dev
      - cmake
      - git
      - curl
    state: present

- name: Refresh facts
  ansible.builtin.setup:

- name: Render Reth systemd unit file
  ansible.builtin.template:
    src: reth.service.j2
    dest: "{{ ethereum_base }}/reth.service"
    owner: "{{ ethereum_user }}"
    group: "{{ ethereum_user }}"
    mode: "0644"
  register: reth_unit

- name: Symlink Reth service to systemd
  ansible.builtin.file:
    src: "{{ ethereum_base }}/reth.service"
    dest: /etc/systemd/system/reth.service
    state: link
    force: True
    owner: root
    group: root
    mode: "0644"
  register: reth_unit_link

- name: Systemd daemon-reload (unit changed)
  ansible.builtin.systemd:
    daemon_reload: True
  when: reth_unit.changed or reth_unit_link.changed

- name: Create jwtsecret file
  become: True
  become_user: "{{ ethereum_user }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      echo 0x$(openssl rand -hex 32 | tr -d "\n") > {{ ethereum_jwtsecret_file }}
    creates: "{{ ethereum_jwtsecret_file }}"
    executable: /bin/bash

- name: Install rustup for {{ ethereum_user }}
  become: True
  become_user: "{{ ethereum_user }}"
  ansible.builtin.shell:
    cmd: |
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
    creates: "{{ ethereum_base }}/.cargo/bin/cargo"
    executable: /bin/bash

- name: Clone reth v{{ reth_version }} source
  become: True
  become_user: "{{ ethereum_user }}"
  ansible.builtin.git:
    repo: "{{ reth_git_repo }}"
    dest: "{{ ethereum_src_path }}/reth-v{{ reth_version }}"
    version: "v{{ reth_version }}"
    depth: 1
    force: True
  when:
    - ansible_local['noderole']['node']['pinned'] != "True"
    - ansible_local['noderole']['node']['version'] != reth_version

- name: Build reth v{{ reth_version }} from source (this takes 15-30 minutes)
  become: True
  become_user: "{{ ethereum_user }}"
  ansible.builtin.shell:
    cmd: "{{ ethereum_base }}/.cargo/bin/cargo build --release --bin reth"
    chdir: "{{ ethereum_src_path }}/reth-v{{ reth_version }}"
    creates: "{{ ethereum_src_path }}/reth-v{{ reth_version }}/target/release/reth"
  environment:
    CARGO_HOME: "{{ ethereum_base }}/.cargo"
    RUSTUP_HOME: "{{ ethereum_base }}/.rustup"
    PATH: "{{ ethereum_base }}/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when:
    - ansible_local['noderole']['node']['pinned'] != "True"
    - ansible_local['noderole']['node']['version'] != reth_version
  notify:
    - Add Service Pinned Status
    - Add Reth service version
    - Restart Reth

- name: Symlink Reth binary
  ansible.builtin.file:
    src: "{{ ethereum_src_path }}/reth-v{{ reth_version }}/target/release/reth"
    dest: "{{ ethereum_base }}/reth"
    state: link
    force: True
    owner: "{{ ethereum_user }}"
    group: "{{ ethereum_user }}"

- name: Install lighthouse (consensus client)
  ansible.builtin.include_role:
    name: setup_install_lighthouse

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure Reth service is running
  ansible.builtin.systemd:
    name: reth
    state: started
    enabled: True
