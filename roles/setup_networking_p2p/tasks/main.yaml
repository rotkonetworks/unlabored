# roles/setup_networking_p2p/tasks/main.yaml
# Standards: 0.2
---
- name: Setup P2P networking
  when: container_internal_ip is defined
  block:
    - name: Install nftables package
      ansible.builtin.package:
        name: nftables
        state: present

    - name: Add eth1_table to routing tables
      ansible.builtin.lineinfile:
        path: /etc/iproute2/rt_tables
        line: "100 eth1_table"
        state: present
        backup: True

    - name: Derive eth1 gateway from facts
      ansible.builtin.set_fact:
        eth1_gateway: "{{ ansible_eth1.ipv4.network | regex_replace('\\.\\d+$', '.1') }}"
      when: ansible_eth1 is defined

    - name: Setup eth2 prerequisites
      when: container_public_ip is defined
      block:
        - name: Add eth2_table to routing tables
          ansible.builtin.lineinfile:
            path: /etc/iproute2/rt_tables
            line: "200 eth2_table"
            state: present
            backup: True

        - name: Find proxmox host for this container
          ansible.builtin.set_fact:
            host_proxmox: "{{ item }}"
          loop: "{{ groups['proxmox_hosts'] | default([]) }}"
          when:
            - hostvars[item]['lxc_nodes'] is defined
            - (hostvars[item]['lxc_nodes'] | selectattr('host', 'equalto', inventory_hostname) | list | length) > 0

        - name: Derive eth2 gateways from proxmox host
          ansible.builtin.set_fact:
            eth2_gateway: "{{ hostvars[host_proxmox]['default_host_public_gw'] }}"
            eth2_gateway6: "{{ hostvars[host_proxmox]['default_host_public_gw6'] }}"
          when: host_proxmox is defined

    - name: Deploy P2P if-up.d script
      ansible.builtin.template:
        src: p2p-routing.sh.j2
        dest: /etc/network/if-up.d/p2p-routing
        mode: "0755"
        owner: root
        group: root

    - name: Configure nftables rules
      ansible.builtin.template:
        src: nftables.conf.j2
        dest: /etc/nftables.conf
        mode: "0644"
        backup: True
      notify:
        - Restart nftables service

    - name: Enable and start nftables service
      ansible.builtin.systemd:
        name: nftables
        enabled: True
        state: started
        daemon_reload: True

    - name: Apply P2P routing immediately (eth1)
      ansible.builtin.command:
        cmd: /etc/network/if-up.d/p2p-routing
      environment:
        IFACE: eth1
      changed_when: False

    - name: Apply P2P routing immediately (eth2)
      ansible.builtin.command:
        cmd: /etc/network/if-up.d/p2p-routing
      environment:
        IFACE: eth2
      changed_when: False
      when: container_public_ip is defined

    - name: Apply nftables ruleset
      ansible.builtin.command:
        cmd: nft -f /etc/nftables.conf
      changed_when: False
