# roles/setup_networking_p2p/tasks/main.yaml
# Standards: 0.2
---
- name: Setup P2P networking
  when: container_internal_ip is defined
  block:
    - name: Install nftables package
      ansible.builtin.package:
        name: nftables
        state: present

    # Interfaces are matched by address, not by name: legacy containers carry
    # eth0=mgmt/eth1=internal/eth2=public, migrated ones eth0=internal/eth1=public.
    - name: Identify management (NAT) interface by address
      ansible.builtin.set_fact:
        mgmt_iface: "{{ item }}"
      loop: "{{ ansible_facts.interfaces | select('match', '^eth') | list }}"
      when: (ansible_facts[item].ipv4.address | default('')).startswith('192.168.')

    - name: Identify internal interface by address
      ansible.builtin.set_fact:
        internal_iface: "{{ item }}"
      loop: "{{ ansible_facts.interfaces | select('match', '^eth') | list }}"
      when: ansible_facts[item].ipv4.address | default('') == container_internal_ip

    - name: Identify public interface by address
      ansible.builtin.set_fact:
        public_iface: "{{ item }}"
      loop: "{{ ansible_facts.interfaces | select('match', '^eth') | list }}"
      when:
        - container_public_ip is defined
        - ansible_facts[item].ipv4.address | default('') == container_public_ip

    - name: Add eth1_table to routing tables
      ansible.builtin.lineinfile:
        path: /etc/iproute2/rt_tables
        line: "100 eth1_table"
        state: present
        backup: True
      when: mgmt_iface is defined

    - name: Derive internal gateway from facts
      ansible.builtin.set_fact:
        internal_gateway: "{{ ansible_facts[internal_iface].ipv4.network | regex_replace('\\.\\d+$', '.1') }}"
      when: internal_iface is defined

    - name: Setup public interface prerequisites
      when: public_iface is defined
      block:
        - name: Add eth2_table to routing tables
          ansible.builtin.lineinfile:
            path: /etc/iproute2/rt_tables
            line: "200 eth2_table"
            state: present
            backup: True

        - name: Find proxmox host for this container
          ansible.builtin.set_fact:
            host_proxmox: "{{ item }}"
          loop: "{{ groups['proxmox_hosts'] | default([]) }}"
          when:
            - hostvars[item]['lxc_nodes'] is defined
            - (hostvars[item]['lxc_nodes'] | selectattr('host', 'equalto', inventory_hostname) | list | length) > 0

        - name: Derive public gateways from proxmox host
          ansible.builtin.set_fact:
            public_gateway: "{{ hostvars[host_proxmox]['default_host_public_gw'] }}"
            public_gateway6: "{{ hostvars[host_proxmox]['default_host_public_gw6'] }}"
          when: host_proxmox is defined

    - name: Deploy P2P if-up.d script
      ansible.builtin.template:
        src: p2p-routing.sh.j2
        dest: /etc/network/if-up.d/p2p-routing
        mode: "0755"
        owner: root
        group: root
      when: internal_iface is defined

    - name: Configure nftables rules
      ansible.builtin.template:
        src: nftables.conf.j2
        dest: /etc/nftables.conf
        mode: "0644"
        backup: True
      notify:
        - Restart nftables service

    - name: Enable and start nftables service
      ansible.builtin.systemd:
        name: nftables
        enabled: True
        state: started
        daemon_reload: True

    - name: Apply P2P routing immediately (internal)
      ansible.builtin.command:
        cmd: /etc/network/if-up.d/p2p-routing
      environment:
        IFACE: "{{ internal_iface }}"
      changed_when: False
      when: internal_iface is defined

    - name: Apply P2P routing immediately (public)
      ansible.builtin.command:
        cmd: /etc/network/if-up.d/p2p-routing
      environment:
        IFACE: "{{ public_iface }}"
      changed_when: False
      when: public_iface is defined

    - name: Apply nftables ruleset
      ansible.builtin.command:
        cmd: nft -f /etc/nftables.conf
      changed_when: False
